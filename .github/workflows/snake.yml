name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23111111&color_dots=%23f6f8fa,%23d0d7de,%238c959f,%236e7781,%2324242f
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f0f6fc&color_dots=%230d1117,%23161b22,%2330363d,%236e7681,%238b949e

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
