<svg width="900" height="86" viewBox="0 0 900 86" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated stack badges</title>
  <desc id="desc">A monochrome row of subtly animated technology badges.</desc>
  <style>
    .badge { transform-box: fill-box; transform-origin: center; }
    .label { font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 16px; font-weight: 700; letter-spacing: 1.6px; fill: #F0F6FC; }
    .mark { font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 13px; font-weight: 700; fill: #111111; }
  </style>
  <rect width="900" height="86" rx="12" fill="#0D1117"/>
  <g class="badge" transform="translate(26 24)">
    <animateTransform attributeName="transform" type="translate" values="26 24;26 19;26 24;26 27;26 24" dur="3.2s" repeatCount="indefinite"/>
    <rect width="144" height="38" rx="6" fill="#111111" stroke="#30363D"/>
    <rect x="14" y="10" width="18" height="18" rx="2" fill="#F0F6FC"/>
    <text class="mark" x="18" y="24">JS</text>
    <text class="label" x="44" y="25">JAVASCRIPT</text>
  </g>
  <g class="badge" transform="translate(188 24)">
    <animateTransform attributeName="transform" type="translate" values="188 24;188 26;188 24;188 19;188 24" dur="3.5s" begin="0.25s" repeatCount="indefinite"/>
    <rect width="154" height="38" rx="6" fill="#111111" stroke="#30363D"/>
    <rect x="14" y="10" width="18" height="18" rx="2" fill="#F0F6FC"/>
    <text class="mark" x="18" y="24">TS</text>
    <text class="label" x="44" y="25">TYPESCRIPT</text>
  </g>
  <g class="badge" transform="translate(360 24)">
    <animateTransform attributeName="transform" type="translate" values="360 24;360 19;360 24;360 26;360 24" dur="3.1s" begin="0.5s" repeatCount="indefinite"/>
    <rect width="132" height="38" rx="6" fill="#111111" stroke="#30363D"/>
    <circle cx="23" cy="19" r="10" fill="none" stroke="#F0F6FC" stroke-width="1.6"/>
    <text class="mark" x="18" y="24" fill="#F0F6FC">N</text>
    <text class="label" x="44" y="25">NODE.JS</text>
  </g>
  <g class="badge" transform="translate(510 24)">
    <animateTransform attributeName="transform" type="translate" values="510 24;510 27;510 24;510 20;510 24" dur="3.6s" begin="0.75s" repeatCount="indefinite"/>
    <rect width="112" height="38" rx="6" fill="#111111" stroke="#30363D"/>
    <circle cx="23" cy="19" r="3" fill="#F0F6FC"/>
    <ellipse cx="23" cy="19" rx="13" ry="5" stroke="#F0F6FC" stroke-width="1.4"/>
    <ellipse cx="23" cy="19" rx="13" ry="5" stroke="#F0F6FC" stroke-width="1.4" transform="rotate(60 23 19)"/>
    <ellipse cx="23" cy="19" rx="13" ry="5" stroke="#F0F6FC" stroke-width="1.4" transform="rotate(120 23 19)"/>
    <text class="label" x="44" y="25">REACT</text>
  </g>
  <g class="badge" transform="translate(640 24)">
    <animateTransform attributeName="transform" type="translate" values="640 24;640 20;640 24;640 27;640 24" dur="3.3s" begin="1s" repeatCount="indefinite"/>
    <rect width="86" height="38" rx="6" fill="#111111" stroke="#30363D"/>
    <path d="M23 8L34 19L23 30L12 19L23 8Z" fill="#F0F6FC"/>
    <path d="M19 15L27 23M23 12V26" stroke="#111111" stroke-width="1.7" stroke-linecap="round"/>
    <text class="label" x="44" y="25">GIT</text>
  </g>
  <path d="M764 43H846" stroke="#30363D" stroke-width="4" stroke-linecap="round"/>
  <path d="M764 43H798" stroke="#8B949E" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d" values="M764 43H786;M764 43H846;M764 43H798;M764 43H786" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
