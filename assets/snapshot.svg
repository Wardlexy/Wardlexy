<svg width="920" height="190" viewBox="0 0 920 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Wardlexy profile snapshot</title>
  <desc id="desc">A monochrome developer snapshot card for a GitHub profile.</desc>
  <rect width="920" height="190" rx="14" fill="#0D1117"/>
  <rect x="0.5" y="0.5" width="919" height="189" rx="13.5" stroke="#30363D"/>
  <text x="34" y="48" fill="#F0F6FC" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="18">snapshot</text>
  <text x="34" y="91" fill="#8B949E" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">focus</text>
  <text x="126" y="91" fill="#F0F6FC" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">practical builds, clean UI, useful automation</text>
  <text x="34" y="124" fill="#8B949E" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">mode</text>
  <text x="126" y="124" fill="#F0F6FC" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">learn, ship, refine</text>
  <text x="34" y="157" fill="#8B949E" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">theme</text>
  <text x="126" y="157" fill="#F0F6FC" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">monochrome, minimal, low noise</text>
  <g transform="translate(660 44)">
    <rect width="200" height="102" rx="10" fill="#111111" stroke="#30363D"/>
    <path d="M28 33H172" stroke="#F0F6FC" stroke-width="7" stroke-linecap="round" stroke-dasharray="144" stroke-dashoffset="144">
      <animate attributeName="stroke-dashoffset" values="144;0;0;144" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M28 58H139" stroke="#8B949E" stroke-width="7" stroke-linecap="round" stroke-dasharray="111" stroke-dashoffset="111">
      <animate attributeName="stroke-dashoffset" values="111;111;0;0;111" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M28 83H160" stroke="#30363D" stroke-width="7" stroke-linecap="round" stroke-dasharray="132" stroke-dashoffset="132">
      <animate attributeName="stroke-dashoffset" values="132;132;132;0;132" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
